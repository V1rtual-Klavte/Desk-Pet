  - { kw: ["superchat", "sc"], anim: "superchat" }
  - { kw: ["gaoo", "嗷呜"], anim: "gaoo" }
  - { kw: ["business", "办公"], anim: "business1" }
  - { kw: ["you", "你"], anim: "you" }

# ── 内置动画（CSS驱动，无需素材）──
