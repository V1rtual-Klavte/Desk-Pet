# ==========================================
# 糖糖桌宠 全局配置 v2
# 功能域：general / ai / tools / appearance
# 主题/角色/音效 → 由 Profile 管理 (public/profiles/)
# 修改此文件后重新 pnpm tauri dev 即可热更新
# ==========================================

# ══════════════════════════════════════════
# 1. 通用设置 (General)
# ══════════════════════════════════════════
general:
  mode:
    assistant: false

  popup:
    mode: cursor
    autoPopupOnMessage: false
    defaultSize: { w: 730, h: 450 }

  shortcut:
    key: "P"
    macModifiers: ["Control", "Command"]
    winModifiers: ["Control", "Alt"]

  logging:
    level: info

  desktop:
    pollingIntervalMs: 3000
    pauseExtraMs: 5000
    waitTimeoutMs: 5000

# ══════════════════════════════════════════
# 2. AI 设置 (AI)
# ══════════════════════════════════════════
ai:
  provider: deepseek
  endpoint: https://api.deepseek.com
  apiKey: ""
  requireApiKey: true
  model: deepseek-chat
  contextMaxTokens: 16000

  defaultSystemPrompt: "你叫糖糖，是一个桌面虚拟主播助手。性格活泼可爱、偶尔傲娇。你会帮主人解决各种问题（技术、生活、闲聊），用你的风格表达。请用简短口语化中文回复，像在和朋友聊天一样。可以加表情，但不要用 markdown。"

  fallbackReplies:
    - "嗯嗯，是这样的呢～"
    - "诶？真的吗？好厉害！"
    - "原来如此～"
    - "我知道哦～！"
    - "哈哈，谢谢你！"
    - "原来是这个样子啊～"
    - "不是吧！？这也太夸张了"
    - "对对对！"
    - "你这么说我好开心～"
    - "欸——这样啊，好有趣！"

  thinking:
    effort: auto
    budget:
      low: 1000
      medium: 4000
      high: 16000

  personality:
    enabled: true
    active: angelkawaii
    cards:
      - { id: angelkawaii, name: KAngel, path: cards/angelkawaii.md, description: "甜蜜活泼女友+病娇" }
      - { id: ame, name: Ame, path: cards/ame.md, description: "冷静管家型" }
      - { id: pchan, name: P酱, path: cards/pchan.md, description: "慵懒电竞少女" }

  loop:
    maxRetry: 3
    maxToolCallsPerTurn: 5
    toolTimeoutMs: 30000
    turnTimeoutMs: 120000
    streamEnabled: false
    contextCompactAt: 0.95

  memory:
    maxEntries: 200

  lock:
    safetyTimeoutMs: 30000

  windowMonitor:
    enabled: true
    staySeconds: 60
    settleMs: 2000
    cooldownSeconds: 5000
    samePageCooldownSeconds: 7800
    defaultCooldownMs: 12000
    resumeExtraMs: 2000

  safety:
    mode: tell_me
    sessionTrustEnabled: true

# ══════════════════════════════════════════
# 3. 工具配置 (Tools)
# ══════════════════════════════════════════
tools:
  bash:
    enabled: true
    whitelist: ["ls", "cat", "head", "tail", "grep", "find", "which",
                "echo", "pwd", "date", "whoami", "uname", "df", "du",
                "ps", "tasklist", "system_profiler", "ifconfig"]

  file:
    enabled: true
    writeEnabled: false

  mcp:
    enabled: false
    servers: []
    builtin:
      filesystem:
        enabled: true
        command: npx
        args: ["-y", "@modelcontextprotocol/server-filesystem", "/"]
        description: "📁 文件系统操作 — 读写/搜索本地文件"
      brave-search:
        enabled: false
        command: npx
        args: ["-y", "@anthropic/mcp-brave-search"]
        env: { BRAVE_API_KEY: "" }
        description: "🔍 Brave Search — 网页搜索（需 API Key）"
      playwright:
        enabled: true
        command: npx
        args: ["-y", "@anthropic/mcp-playwright"]
        description: "🎭 Playwright — 无头浏览器自动化测试"
      git:
        enabled: false
        command: npx
        args: ["-y", "@anthropic/mcp-git", "/"]
        description: "📝 Git — 版本控制操作"
      github:
        enabled: false
        command: npx
        args: ["-y", "@anthropic/mcp-github"]
        env: { GITHUB_PERSONAL_ACCESS_TOKEN: "" }
        description: "🐙 GitHub — 仓库/Issue/PR 管理（需 Token）"

  skill:
    enabled: false
    skills: []

# ══════════════════════════════════════════
# 4. 外观 — Profile 系统
# ══════════════════════════════════════════
# 主题/角色/音效配置已移至 public/profiles/ 目录
# 每个 profile 是一个自包含文件夹，拖入即用
appearance:
  activeProfile: "sugar-pink"     # 当前激活的 Profile ID
